[colors]
background = #11111b
foreground = #cdd6f4

pink = #f5c2e7
blue = #89b4fa
cyan = #94e2d5
green = #a6e3a1
yellow = #f9e2af
red = #f38ba8

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/main]
monitor = DP-2

width = 100%
height = 32

radius = 12

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

border-size = 0

padding-left = 2
padding-right = 2

module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=11;3"

modules-left = i3
modules-center = date music prev playpause next
modules-right = cpu memory battery pulseaudio

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3
override-redirect = false

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/i3]
type = internal/i3

pin-workspaces = true
enable-click = true
enable-scroll = true

ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;
ws-icon-4 = 5;

format = <label-state>

label-focused = %icon%
label-focused-foreground = ${colors.blue}
label-focused-padding = 2

label-unfocused = %icon%
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding = 2

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/xwindow]
type = internal/xwindow

label = %title:0:50:...%
label-foreground = ${colors.cyan}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/date]
type = internal/date

interval = 1

date = %I:%M %p
date-alt = %A, %d %B

label = 󰥔 %date%
label-foreground = ${colors.pink}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/cpu]
type = internal/cpu
interval = 2

format = <label>
label = CPU %percentage%%
label-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/memory]
type = internal/memory
interval = 2

format = <label>
label = RAM %percentage_used%%
label-foreground = ${colors.pink}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/wlan]
type = internal/network

interface = wlan0
interval = 3

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-connected = WIFI
label-disconnected = OFFLINE

label-connected-foreground = ${colors.cyan}
label-disconnected-foreground = ${colors.gray}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/battery]
type = internal/battery

battery = BAT0
adapter = ACAD

poll-interval = 5

format-discharging = <label-discharging>
format-charging = <label-charging>

label-discharging = BAT %percentage%%
label-charging = CHR %percentage%%

label-discharging-foreground = ${colors.cyan}
label-charging-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume = VOL %percentage%%

label-muted = MUTED
label-volume-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/prev]
type = custom/text

format = "󰒮"

click-left = playerctl -p "$(cat /tmp/polybar-player)" previous

format-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/playpause]
type = custom/text

format = "󰐊"

click-left = playerctl -p "$(cat /tmp/polybar-player)" play-pause

format-foreground = ${colors.pink}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/next]
type = custom/text

format = "󰒭"

click-left = playerctl -p "$(cat /tmp/polybar-player)" next

format-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/music]
type = custom/script

exec = ~/.config/polybar/scripts/player-status.sh

interval = 1

label-maxlen = 40

format-prefix = "󰎈 "

label-foreground = ${colors.cyan}

scroll-up = playerctl -p "$(playerctl -l | tail -1)" play-pause
scroll-down = ~/.config/polybar/scripts/player-cycle.sh
