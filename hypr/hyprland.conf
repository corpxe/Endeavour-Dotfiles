$mainMod = SUPER

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor= HDMI-A-1, 1440x900, 0x0, 1
monitor= eDP-1, 1920x1080, 1440x0, 1

################
### APPS ###
################

$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun

################
### AUTOSTART ##
################

exec-once = mpvpaper -o "loop no-audio panscan=1.0" HDMI-A-1 ~/wallpapers/live/ben.mp4
exec-once = mpvpaper -o "loop no-audio panscan=1.0" eDP-1 ~/wallpapers/live/ben.mp4

exec-once = waybar &
exec-once = dunst
#exec-once = hyprpanel
exec-once = swayosd-server
exec-once = swaync

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

################
### GENERAL ###
################

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(7aa2f7ff)
    col.inactive_border = rgba(444444aa)

    layout = dwindle
}

################
### DECORATION ###
################

decoration {
    rounding = 14

    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true

        size = 8
        passes = 3

        new_optimizations = true

        ignore_opacity = true

        xray = false
    }

    shadow {
        enabled = true

        range = 20
        render_power = 3

        color = rgba(00000055)
    }
}

###############
## Animation ##
###############

animations {
    enabled = yes

    bezier = smooth,0.05,0.9,0.1,1
    bezier = overshot,0.13,0.99,0.29,1.1

    animation = windows,1,6,overshot
    animation = windowsIn,1,6,overshot,popin 85%
    animation = windowsOut,1,5,smooth,popin 85%

    animation = border,1,5,smooth
    animation = fade,1,5,smooth
    animation = workspaces,1,4,smooth
}

###############
#### INPUT ####
###############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

################
### CURSOR ###
################

cursor {
    no_hardware_cursors = true
}

################
### BINDS ###
################
bind = $mainMod, P, pseudo

bind = $mainMod, T, exec, kitty
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, E, exec, thunar

bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, W, exec, ~/.tarball-installations/zen/zen
bind = $mainMod, C, exec, code
bind = $mainMod, S, exec, spotify-launcher
bind = $mainMod, A, exec, kitty --class gemini -e gemini
bind = $mainMod, G, exec, eww open --toggle dashboard
bind = $mainMod, L, exec, wlogout
bind = $mainMod, B, exec, brave
bind = $mainMod, O, exec, obsidian

bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod SHIFT, V, exec, cliphist list | walker -d | cliphist decode | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, TAB, cyclenext
bind = $mainMod SHIFT, A, togglespecialworkspace, ai
bind = $mainMod CTRL, A, movetoworkspace, special:ai

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#  GNU nano 9.0                            /home/corpxe/Desktop/Arch-Dotfiles/dotfiles/hypr/hyprland.conf                                      
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, ~, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod SHIFT, L, exec, hyprlock


dwindle {
    preserve_split = true
}
